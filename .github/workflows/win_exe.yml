name: Build Windows exe
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install InnoSetup if missing
        run: |
          if (-not (Get-Command "innosetup" -ErrorAction SilentlyContinue)) {
            choco install innosetup -y
          } else {
            Write-Output "InnoSetup already installed."
          }

      - name: Update lang data
        working-directory: "${{ github.workspace }}"
        run: dart localization/generator.dart

      - name: Set update check flag to true
        working-directory: "${{ github.workspace }}/lib/utils"
        run: echo "const updateCheckFlag = true;" > update_check_flag_file.dart

      - name: Build windows exe package
        working-directory: "${{ github.workspace }}"
        run: |
          flutter clean
          dart pub global activate flutter_distributor
          flutter_distributor package --platform windows --targets exe

      - name: Find first .exe file
        id: find_exe
        run: |
          $lastSubDir = Get-ChildItem -Path "${{ github.workspace }}/dist" -Directory | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $exeFile = Get-ChildItem -Path "$($lastSubDir.FullName)/*.exe" | Select-Object -First 1
          if ($exeFile) {
              echo "Found .exe file: $($exeFile.FullName)"
              echo "exe_path=$($exeFile.FullName)" >> $env:GITHUB_OUTPUT
          } else {
              Write-Error "No .exe files found in the dist directory."
              exit 1
          }

      - name: Expose signing key presence
        shell: pwsh
        run: |
          $rawKey = @'
          ${{ secrets.KEY_PEM }}
          '@
          $rawKey = $rawKey.Trim()

          $hasPemHeader = $rawKey -match "-----BEGIN .*PRIVATE KEY-----"
          $decodedHasPemHeader = $false

          if (-not $hasPemHeader -and $rawKey -ne "") {
            try {
              $decodedKey = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($rawKey)).Trim()
              if ($decodedKey -match "-----BEGIN .*PRIVATE KEY-----") {
                $decodedHasPemHeader = $true
              }
            } catch {
              # Not valid base64; treat as not signable.
            }
          }

          if ($hasPemHeader -or $decodedHasPemHeader) {
            "KEY_PEM_PRESENT=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "KEY_PEM_PRESENT=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            if ($rawKey -ne "") {
              Write-Host "KEY_PEM is set but not in PEM/base64-PEM format. Skipping signing."
            }
          }

      - name: Set up osslsigncode
        if: ${{ env.KEY_PEM_PRESENT == 'true' }}
        run: |
          Invoke-WebRequest -Uri "https://github.com/mtrojnar/osslsigncode/releases/download/2.9/osslsigncode-2.9-windows-x64-mingw.zip" -OutFile "osslsigncode.zip"
          Expand-Archive -Path "osslsigncode.zip" -DestinationPath "osslsigncode"
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\osslsigncode"

      - name: Make signing dir
        if: ${{ env.KEY_PEM_PRESENT == 'true' }}
        working-directory: "${{ github.workspace }}"
        run: mkdir signed

      - name: Collecting certs and key
        if: ${{ env.KEY_PEM_PRESENT == 'true' }}
        working-directory: "${{ github.workspace }}/signed"
        run: |
          $rawKey = @'
          ${{ secrets.KEY_PEM }}
          '@
          $rawKey = $rawKey.Trim()
          try {
            $decodedBytes = [System.Convert]::FromBase64String($rawKey)
            $decodedKey = [System.Text.Encoding]::UTF8.GetString($decodedBytes).Trim()
            if ($decodedKey -match "-----BEGIN .*PRIVATE KEY-----") {
              $decodedKey | Out-File -FilePath key.pem -Encoding ASCII
            } else {
              $rawKey | Out-File -FilePath key.pem -Encoding ASCII
            }
          } catch {
            $rawKey | Out-File -FilePath key.pem -Encoding ASCII
          }
          cp "${{ github.workspace }}/win_cert/DigiCertGlobalRootCA.crt" .
          cp "${{ github.workspace }}/win_cert/cert.pem" .

      - name: Sign executable
        if: ${{ env.KEY_PEM_PRESENT == 'true' }}
        working-directory: "${{ github.workspace }}/signed"
        run: |
          $exePath = "${{ steps.find_exe.outputs.exe_path }}"
          $signedExePath = "$exePath".Replace(".exe", "_signed.exe")
          & "${{ github.workspace }}/osslsigncode/bin/osslsigncode.exe" sign -certs cert.pem -key key.pem -t http://timestamp.digicert.com -in "$exePath" -out "$signedExePath"

      - name: Verify signature
        if: ${{ env.KEY_PEM_PRESENT == 'true' }}
        working-directory: "${{ github.workspace }}/signed"
        run: |
          $signedExePath = "${{ steps.find_exe.outputs.exe_path }}".Replace(".exe", "_signed.exe")
          & "${{ github.workspace }}/osslsigncode/bin/osslsigncode.exe" verify -in "$signedExePath" -TSA-CAfile DigiCertGlobalRootCA.crt -CAfile cert.pem

      - name: Resolve final exe path
        id: resolve_exe
        run: |
          $signedExePath = "${{ steps.find_exe.outputs.exe_path }}".Replace(".exe", "_signed.exe")
          if (Test-Path $signedExePath) {
            echo "exe_path=$signedExePath" >> $env:GITHUB_OUTPUT
            echo "asset_name=$(Split-Path $signedExePath -Leaf)" >> $env:GITHUB_OUTPUT
          } else {
            echo "exe_path=${{ steps.find_exe.outputs.exe_path }}" >> $env:GITHUB_OUTPUT
            echo "asset_name=$(Split-Path '${{ steps.find_exe.outputs.exe_path }}' -Leaf)" >> $env:GITHUB_OUTPUT
          }

      - name: Resolve release metadata
        id: release_meta
        run: |
          $defaultTag = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $tagName = $defaultTag
            $releaseName = $defaultTag
            $isPreRelease = "false"
          } else {
            $versionLine = (Select-String -Path "${{ github.workspace }}/pubspec.yaml" -Pattern '^version:\s*').Line
            $version = $versionLine.Split(':')[1].Trim().Split('+')[0]
            $tagName = "v$version-windows.${{ github.run_number }}"
            $releaseName = "Windows build v$version (${{ github.run_number }})"
            $isPreRelease = "true"
          }
          echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          echo "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          echo "prerelease=$isPreRelease" >> $env:GITHUB_OUTPUT

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Harmony music windows exe
          path: "${{ steps.resolve_exe.outputs.exe_path }}"

      - name: Create GitHub release with exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.release_meta.outputs.tag_name }}"
          name: "${{ steps.release_meta.outputs.release_name }}"

          
          prerelease: "${{ steps.release_meta.outputs.prerelease }}"
          files: "${{ steps.resolve_exe.outputs.exe_path }}"
